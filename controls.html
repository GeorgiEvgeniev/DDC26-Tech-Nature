<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controls</title>
<style>
  :root {
    color-scheme: dark;
    --panel: rgba(23, 30, 44, 0.9);
    --panel-edge: rgba(255, 255, 255, 0.08);
    --text: rgba(255, 255, 255, 0.92);
    --muted: rgba(255, 255, 255, 0.58);
    --track: linear-gradient(180deg, #131927 0%, #0c111b 100%);
    --thumb: radial-gradient(circle at 35% 30%, #ffffff 0 22%, #f0f4fb 23% 100%);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    color: var(--text);
    font-family: "Segoe UI", "Trebuchet MS", sans-serif;
    background:
      radial-gradient(circle at 50% 14%, rgba(92, 105, 138, 0.24), transparent 24%),
      radial-gradient(circle at 16% 28%, rgba(54, 69, 100, 0.18), transparent 26%),
      radial-gradient(circle at 84% 24%, rgba(54, 69, 100, 0.18), transparent 26%),
      linear-gradient(180deg, #161b27 0%, #0d1018 54%, #06080d 100%);
    overflow: hidden;
  }

  body::before,
  body::after {
    content: "";
    position: fixed;
    inset: -10%;
    pointer-events: none;
  }

  body::before {
    background:
      radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.12), transparent 28%),
      radial-gradient(circle at 50% 80%, rgba(255, 255, 255, 0.04), transparent 34%);
    filter: blur(16px);
  }

  body::after {
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 4px 4px;
    opacity: 0.12;
  }

  .frame {
    width: min(700px, 100%);
    padding: 24px;
    border-radius: 24px;
    border: 1px solid var(--panel-edge);
    background:
      linear-gradient(180deg, rgba(34, 42, 60, 0.84), rgba(18, 24, 36, 0.9));
    box-shadow:
      0 24px 70px rgba(0, 0, 0, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  .frame::before,
  .frame::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .frame::before {
    background:
      radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.1), transparent 28%),
      radial-gradient(circle at 0% 50%, rgba(125, 145, 180, 0.12), transparent 16%),
      radial-gradient(circle at 100% 50%, rgba(125, 145, 180, 0.12), transparent 16%);
    opacity: 0.8;
  }

  .frame::after {
    inset: 12px;
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.04);
  }

  .header {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: flex-end;
    margin-bottom: 22px;
  }

  .title-block {
    display: grid;
    gap: 6px;
  }

  h1 {
    margin: 0;
    font-size: clamp(1.7rem, 2.8vw, 2.4rem);
    font-weight: 500;
    letter-spacing: -0.04em;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.92rem;
    letter-spacing: 0.02em;
  }

  .badge {
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(10, 14, 22, 0.28);
    color: rgba(255, 255, 255, 0.68);
    font-size: 0.8rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .mixer {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .rail-label {
    width: 96px;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .slider-shell {
    flex: 1;
    padding: 18px 20px;
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    background: linear-gradient(180deg, rgba(20, 26, 39, 0.88), rgba(14, 18, 28, 0.92));
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.04),
      inset 0 -14px 24px rgba(0, 0, 0, 0.16);
  }

  .slider-top,
  .slider-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.52);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .slider-bottom {
    margin-top: 10px;
  }

  .value-pill {
    min-width: 46px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.06);
    color: rgba(255, 255, 255, 0.84);
    text-align: center;
    letter-spacing: 0.08em;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    margin: 22px 0 20px;
    background: transparent;
    cursor: pointer;
  }

  input[type="range"]:focus {
    outline: none;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 8px;
    border-radius: 999px;
    background:
      linear-gradient(90deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05)),
      var(--track);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  input[type="range"]::-moz-range-track {
    height: 8px;
    border: 0;
    border-radius: 999px;
    background: var(--track);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 26px;
    height: 26px;
    margin-top: -9px;
    border-radius: 50%;
    border: 1px solid rgba(25, 30, 40, 0.78);
    background: var(--thumb);
    box-shadow:
      0 3px 8px rgba(0, 0, 0, 0.5),
      0 0 0 10px rgba(255, 255, 255, 0.03);
  }

  input[type="range"]::-moz-range-thumb {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(25, 30, 40, 0.78);
    background: var(--thumb);
    box-shadow:
      0 3px 8px rgba(0, 0, 0, 0.5),
      0 0 0 10px rgba(255, 255, 255, 0.03);
  }

  .hint {
    position: relative;
    z-index: 1;
    margin-top: 18px;
    color: rgba(255, 255, 255, 0.46);
    font-size: 0.82rem;
    letter-spacing: 0.04em;
  }

  @media (max-width: 560px) {
    .frame {
      padding: 18px;
    }

    .header {
      flex-direction: column;
      align-items: flex-start;
    }

    .mixer {
      flex-direction: column;
      align-items: stretch;
    }

    .rail-label {
      width: auto;
    }
  }
</style>
</head>
<body>

<main class="frame">
  <div class="header">
    <div class="title-block">
      <h1>Controls</h1>
      <div class="subtitle">Single-channel blend with the same atmospheric mixer vibe.</div>
    </div>
    <div class="badge">Tech to Nature</div>
  </div>

  <div class="mixer">
    <div class="rail-label">Blend</div>
    <div class="slider-shell">
      <div class="slider-top">
        <span>Tech</span>
        <span class="value-pill" id="valueLabel">0</span>
        <span>Nature</span>
      </div>
      <input type="range" min="0" max="4" value="0" id="slider" aria-label="Tech to Nature mix">
      <div class="slider-bottom">
        <span>Low density</span>
        <span>High density</span>
      </div>
    </div>
  </div>

  <div class="hint">Use arrow keys or drag to shift the environment.</div>
</main>

<script>
  const slider = document.getElementById('slider');
  const valueLabel = document.getElementById('valueLabel');

  function updateStorage() {
    localStorage.setItem('mix', slider.value);
    valueLabel.textContent = slider.value;
  }

  // Initialize from storage
  slider.value = localStorage.getItem('mix') || 0;
  valueLabel.textContent = slider.value;

  slider.addEventListener('input', updateStorage);

  // Keyboard control
  document.addEventListener('keydown', function(event) {
    let changed = false;

    switch(event.key) {
      case 'ArrowRight':
      case 'ArrowUp':
        slider.value = Math.min(+slider.value + 1, 4);
        changed = true;
        break;
      case 'ArrowLeft':
      case 'ArrowDown':
        slider.value = Math.max(+slider.value - 1, 0);
        changed = true;
        break;
    }

    if (changed) {
      event.preventDefault();
      updateStorage();
    }
  });

  // Initial sync
  updateStorage();
</script>

</body>
</html>
